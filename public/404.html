<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hotel Supply Pro</title>
  <script>
    // SPA redirect for GitHub Pages
    // Redirects /orders?id=xxx etc. back to the SPA
    var path = window.location.pathname;
    var query = window.location.search;
    var hash = window.location.hash;
    window.location.replace('/' + '?p=' + encodeURIComponent(path + query + hash));
  </script>
</head>

</body>
</html>
